<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jayasinghe Tours | Sri Lanka Car Rental & Tours</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="#" class="navbar-brand"><h2>Jayasinghe Tours</h2></a>
  <div class="nav-links">
    <a href="#cars">Cars</a>
    <a href="#tours">Tours</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="section" id="cars">
  <h2>Our Fleet</h2>
  <div class="cards">
    <div class="card" onclick="openModal('wagonr')">
      <img src="https://github.com/T-N-S-01/Car-Rental-Tourist-web-/blob/main/src/assets/img/wagonr3.jpg?raw=true" alt="Suzuki Wagon R">
      <div class="card-content"><h3>Suzuki Wagon R</h3></div>
    </div>
  </div>
</section>

<section class="section" id="tours">
  <h2>Sri Lanka Tours</h2>
  <div class="cards">
    <div class="card" onclick="openModal('sigiriya')">
      <img src="https://images.unsplash.com/photo-1588598198321-97368dcf0456?q=80" alt="Sigiriya">
      <div class="card-content"><h3>Sigiriya</h3></div>
    </div>
  </div>
</section>

<div id="wagonr" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('wagonr')">&times;</span>
    <div class="gallery-slider-container">
      <div class="gallery-slides" id="slides-wagonr">
        <div class="gallery-slide" style="background-image: url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?q=80');"></div>
        <div class="gallery-slide" style="background-image: url('https://images.unsplash.com/photo-1617469165786-8007eda3caa7?q=80');"></div>
      </div>
      <span class="gallery-arrow gallery-prev" onclick="moveGallery('wagonr', -1)">&#10094;</span>
      <span class="gallery-arrow gallery-next" onclick="moveGallery('wagonr', 1)">&#10095;</span>
    </div>
    <h2>Suzuki Wagon R</h2>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
